<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>monblanprojec</title>
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
<div class="main-layout">
    <div class="header-vector1">
        <img src="img/Vector 1.png" alt="Gradient Background">
    </div>

    <header class="profile-header">
        <div class="header-avatar">
            <a href="#">
                <img src="./img/logo.svg" alt="Monblan Project Logo">
            </a>
        </div>

        <div class="header-info">
            <div class="profile-top-row">
                <span class="profile-name">monblanproject</span>
                <span class="profile-start-badge">Start on 17-02-2016</span>
            </div>

            <div class="profile-stats">
                <div class="profile-stat"><strong>870</strong><span>posts</span></div>
                <div class="profile-stat"><strong>11,787</strong><span>followers</span></div>
                <div class="profile-stat"><strong>112</strong><span>following</span></div>
            </div>

            <div class="date-filter">
                <span class="date-filter-label">Date</span>

                <div class="date-input-wrap">
                    <input id="date-from" type="text" placeholder="from" readonly />
                    <div class="date-input-actions">
                        <button class="date-clear-btn" id="clear-from" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 10 10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></line><line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></line></svg></button>
                        <button class="date-cal-btn" id="cal-from" aria-label="Calendar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2.5" width="12" height="10.5" rx="1" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="4.5" y1="1" x2="4.5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="9.5" y1="1" x2="9.5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
                    </div>
                </div>

                <div class="date-input-wrap">
                    <input id="date-to" type="text" placeholder="09_08_2016" readonly />
                    <div class="date-input-actions">
                        <button class="date-clear-btn" id="clear-to" aria-label="Clear"><svg width="14" height="14" viewBox="0 0 10 10"><line x1="1.5" y1="1.5" x2="8.5" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></line><line x1="8.5" y1="1.5" x2="1.5" y2="8.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"></line></svg></button>
                        <button class="date-cal-btn" id="cal-to" aria-label="Calendar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2.5" width="12" height="10.5" rx="1" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="6" x2="13" y2="6" stroke="currentColor" stroke-width="1.2"/><line x1="4.5" y1="1" x2="4.5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="9.5" y1="1" x2="9.5" y2="4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="content-toolbar">
        <div class="view-toggle">
            <button class="view-btn active" id="btn-grid" title="Grid view"><svg width="18" height="18" viewBox="0 0 18 18"><rect x="1" y="1" width="6.5" height="6.5" rx="0.5" fill="currentColor"/><rect x="10.5" y="1" width="6.5" height="6.5" rx="0.5" fill="currentColor"/><rect x="1" y="10.5" width="6.5" height="6.5" rx="0.5" fill="currentColor"/><rect x="10.5" y="10.5" width="6.5" height="6.5" rx="0.5" fill="currentColor"/></svg></button>
            <button class="view-btn" id="btn-list" title="List view"><svg width="18" height="18" viewBox="0 0 18 18"><rect x="1" y="2" width="4" height="4" rx="0.5" fill="currentColor"/><line x1="7.5" y1="4" x2="17" y2="4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><rect x="1" y="8" width="4" height="4" rx="0.5" fill="currentColor"/><line x1="7.5" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><rect x="1" y="13.5" width="4" height="3" rx="0.5" fill="currentColor"/><line x1="7.5" y1="15" x2="17" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>
        </div>
    </div>

    <section class="container">
        <div class="content-area">
            <div id="content" class="grid-view"></div>
            <div class="load-more-wrap">
                <button class="load-more-btn" id="load-more">Load More</button>
            </div>
        </div>

        <div class="blob-bottom-right">
            <img src="img/Vector 2.png" alt="Decoration">
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
